<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>피카츄 vs 고라파덕 배구</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Jua', sans-serif;
            touch-action: none;
            overflow: hidden;
            background-color: #f0fdf4;
        }
        canvas {
            display: block;
            background: #87CEEB;
            max-width: 100%;
            max-height: 70vh;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            border: 6px solid white;
        }
        .control-btn {
            user-select: none;
            touch-action: manipulation;
            transition: all 0.1s;
        }
        .control-btn:active {
            transform: scale(0.95);
            filter: brightness(0.9);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div id="game-container" class="relative w-full max-w-5xl bg-white/90 backdrop-blur-md p-6 rounded-[48px] shadow-2xl border-4 border-green-100">
        <div class="flex justify-between items-center mb-6 px-10">
            <div class="flex flex-col items-center">
                <div class="w-16 h-16 bg-yellow-100 rounded-full flex items-center justify-center mb-1 border-2 border-yellow-200">
                    <span class="text-3xl">🐥</span>
                </div>
                <span class="text-lg text-orange-500 font-bold">고라파덕</span>
                <span id="score1" class="text-5xl font-black text-orange-600">0</span>
            </div>
            <div class="text-center">
                <div class="bg-blue-600 text-white px-6 py-1 rounded-full text-sm font-bold mb-2 tracking-widest uppercase">World Championship</div>
                <h1 class="text-4xl font-black text-blue-600 italic tracking-tighter drop-shadow-sm">POKÉMON VOLLEY</h1>
            </div>
            <div class="flex flex-col items-center">
                <div class="w-16 h-16 bg-yellow-100 rounded-full flex items-center justify-center mb-1 border-2 border-yellow-200">
                    <span class="text-3xl">⚡</span>
                </div>
                <span class="text-lg text-yellow-500 font-bold">피카츄</span>
                <span id="score2" class="text-5xl font-black text-yellow-600">0</span>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="mobile-controls" class="grid grid-cols-3 gap-4 mt-6 w-full max-w-lg mx-auto md:hidden">
            <div class="flex gap-2">
                <button id="btn-left" class="control-btn bg-white border-b-4 border-gray-200 w-full p-5 rounded-2xl text-2xl shadow-md">◀</button>
                <button id="btn-right" class="control-btn bg-white border-b-4 border-gray-200 w-full p-5 rounded-2xl text-2xl shadow-md">▶</button>
            </div>
            <button id="btn-up" class="control-btn bg-blue-500 border-b-4 border-blue-700 text-white p-5 rounded-2xl font-bold text-lg shadow-md uppercase">Jump</button>
            <button id="btn-down" class="control-btn bg-rose-500 border-b-4 border-rose-700 text-white p-5 rounded-2xl font-bold text-lg shadow-md uppercase">Hit</button>
        </div>

        <div class="mt-4 text-center text-gray-400 text-sm hidden md:block">
            이동: 화살표 (←, →) | 점프: 화살표 (↑) | 스매시: Enter 또는 아래(↓)
        </div>

        <div id="overlay" class="absolute inset-0 bg-white/80 backdrop-blur-sm flex flex-col items-center justify-center z-20 hidden rounded-[48px]">
            <div class="text-center">
                <h2 id="winner-text" class="text-6xl font-bold mb-8 text-blue-600">고라파덕 승리!</h2>
                <button onclick="resetGame()" class="px-14 py-4 bg-yellow-400 hover:bg-yellow-300 text-yellow-900 text-2xl font-black rounded-full transition-all shadow-xl active:translate-y-1">
                    다시 도전하기
                </button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const score1El = document.getElementById('score1');
        const score2El = document.getElementById('score2');
        const overlay = document.getElementById('overlay');
        const winnerText = document.getElementById('winner-text');

        const CANVAS_WIDTH = 800;
        const CANVAS_HEIGHT = 450;
        const GRAVITY = 0.45;
        const SPEED_MULT = 0.95; // Requested speed reduction
        const PIKACHU_SIZE = 70;
        const BALL_RADIUS = 22;
        const NET_WIDTH = 10;
        const NET_HEIGHT = 160;

        canvas.width = CANVAS_WIDTH;
        canvas.height = CANVAS_HEIGHT;

        let score1 = 0;
        let score2 = 0;
        let isGameOver = false;

        class Character {
            constructor(x, type, isPlayer) {
                this.x = x;
                this.y = CANVAS_HEIGHT - PIKACHU_SIZE;
                this.width = PIKACHU_SIZE;
                this.height = PIKACHU_SIZE;
                this.vx = 0;
                this.vy = 0;
                this.type = type;
                this.isPlayer = isPlayer;
                this.isJumping = false;
                this.speed = 6.8;
                this.jumpForce = -13;
                this.facingLeft = !isPlayer;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x + this.width / 2, this.y + this.height / 2);
                if (this.facingLeft) ctx.scale(-1, 1);

                if (this.type === 'psyduck') {
                    this.drawSimplePsyduck();
                } else {
                    this.drawPikachu();
                }
                ctx.restore();
            }

            drawSimplePsyduck() {
                // Round Body (Simplified for cuteness)
                ctx.fillStyle = '#FFE135';
                ctx.beginPath();
                ctx.ellipse(0, 5, 35, 30, 0, 0, Math.PI * 2);
                ctx.fill();

                // Round Head
                ctx.beginPath();
                ctx.ellipse(0, -20, 28, 25, 0, 0, Math.PI * 2);
                ctx.fill();

                // Beak (Simplified flat rounded rectangle)
                ctx.fillStyle = '#FFF3A3';
                ctx.beginPath();
                ctx.roundRect(-18, -15, 40, 18, 10);
                ctx.fill();
                ctx.strokeStyle = '#D4C68D';
                ctx.lineWidth = 1;
                ctx.stroke();

                // 3 Hairs (Iconic)
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 2.5;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(0, -45); ctx.lineTo(-5, -55);
                ctx.moveTo(0, -45); ctx.lineTo(0, -58);
                ctx.moveTo(0, -45); ctx.lineTo(5, -55);
                ctx.stroke();

                // Blank Eyes (Small dots for 'empty' look)
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(-10, -28, 8, 0, Math.PI * 2);
                ctx.arc(10, -28, 8, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(-8, -28, 2.5, 0, Math.PI * 2);
                ctx.arc(10, -28, 2.5, 0, Math.PI * 2);
                ctx.fill();
            }

            drawPikachu() {
                // Body
                ctx.fillStyle = '#FFDE00';
                ctx.beginPath();
                ctx.roundRect(-25, -20, 50, 48, 15);
                ctx.fill();

                // Ears
                ctx.beginPath();
                ctx.ellipse(-18, -35, 8, 22, -0.4, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.ellipse(-20, -48, 5, 10, -0.4, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#FFDE00';
                ctx.beginPath();
                ctx.ellipse(18, -35, 8, 22, 0.4, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.ellipse(20, -48, 5, 10, 0.4, 0, Math.PI * 2);
                ctx.fill();

                // Face
                ctx.fillStyle = '#ff4d4d'; // Cheeks
                ctx.beginPath();
                ctx.arc(-18, 5, 8, 0, Math.PI * 2);
                ctx.arc(18, 5, 8, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(-12, -8, 3.5, 0, Math.PI * 2);
                ctx.arc(12, -8, 3.5, 0, Math.PI * 2);
                ctx.fill();
            }

            update() {
                this.x += this.vx * SPEED_MULT;
                this.y += this.vy * SPEED_MULT;

                if (this.y + this.height < CANVAS_HEIGHT) {
                    this.vy += GRAVITY;
                    this.isJumping = true;
                } else {
                    this.vy = 0;
                    this.y = CANVAS_HEIGHT - this.height;
                    this.isJumping = false;
                }

                const netLimit = NET_WIDTH / 2;
                if (this.isPlayer) {
                    if (this.x < 0) this.x = 0;
                    if (this.x + this.width > CANVAS_WIDTH / 2 - netLimit) this.x = CANVAS_WIDTH / 2 - netLimit - this.width;
                } else {
                    if (this.x < CANVAS_WIDTH / 2 + netLimit) this.x = CANVAS_WIDTH / 2 + netLimit;
                    if (this.x + this.width > CANVAS_WIDTH) this.x = CANVAS_WIDTH - this.width;
                }
            }
        }

        class Ball {
            constructor() {
                this.reset();
            }
            reset(toPlayer = true) {
                this.x = toPlayer ? 100 : CANVAS_WIDTH - 100;
                this.y = 100;
                this.vx = 0;
                this.vy = 2;
                this.radius = BALL_RADIUS;
                this.angle = 0;
                this.rotationSpeed = 0;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                
                // Outer circle
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'white';
                ctx.fill();
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 3;
                ctx.stroke();

                // Pokéball design
                ctx.fillStyle = '#ff1a1a';
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, Math.PI, 0);
                ctx.fill();
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(-this.radius, 0);
                ctx.lineTo(this.radius, 0);
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(0, 0, 5, 0, Math.PI * 2);
                ctx.fillStyle = 'white';
                ctx.fill();
                ctx.stroke();
                
                ctx.restore();
            }
            update() {
                this.vy += GRAVITY * 0.48 * SPEED_MULT;
                this.x += this.vx * SPEED_MULT;
                this.y += this.vy * SPEED_MULT;
                this.angle += this.rotationSpeed;

                // Wall collisions
                if (this.x - this.radius < 0 || this.x + this.radius > CANVAS_WIDTH) {
                    this.vx *= -0.8;
                    this.x = this.x < this.radius ? this.radius : CANVAS_WIDTH - this.radius;
                }
                if (this.y - this.radius < 0) {
                    this.vy *= -0.8;
                    this.y = this.radius;
                }

                // Net collision
                const netX = CANVAS_WIDTH / 2;
                const netTop = CANVAS_HEIGHT - NET_HEIGHT;
                if (this.x + this.radius > netX - NET_WIDTH / 2 && this.x - this.radius < netX + NET_WIDTH / 2) {
                    if (this.y > netTop) {
                        this.vx *= -0.8;
                        this.x = (this.x < netX) ? netX - NET_WIDTH / 2 - this.radius : netX + NET_WIDTH / 2 + this.radius;
                    } else if (this.y + this.radius > netTop && Math.abs(this.x - netX) < NET_WIDTH) {
                        this.vy *= -0.8;
                        this.y = netTop - this.radius;
                    }
                }

                // Floor collision (Scoring)
                if (this.y + this.radius > CANVAS_HEIGHT) {
                    if (this.x < CANVAS_WIDTH / 2) {
                        score2++; score2El.innerText = score2; checkWin(); this.reset(true);
                    } else {
                        score1++; score1El.innerText = score1; checkWin(); this.reset(false);
                    }
                }
            }
        }

        function drawScene() {
            // Sky
            const skyGrad = ctx.createLinearGradient(0, 0, 0, CANVAS_HEIGHT);
            skyGrad.addColorStop(0, '#bae6fd');
            skyGrad.addColorStop(1, '#e0f2fe');
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // Poke-Sun
            ctx.save();
            ctx.translate(120, 80);
            ctx.fillStyle = '#f87171';
            ctx.beginPath(); ctx.arc(0, 0, 30, Math.PI, 0); ctx.fill();
            ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.arc(0, 0, 30, 0, Math.PI); ctx.fill();
            ctx.strokeStyle = '#334155'; ctx.lineWidth = 3; ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-30, 0); ctx.lineTo(30, 0); ctx.stroke();
            ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            ctx.restore();

            // Hills
            ctx.fillStyle = '#86efac';
            ctx.beginPath(); ctx.ellipse(200, 480, 450, 150, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#4ade80';
            ctx.beginPath(); ctx.ellipse(650, 480, 400, 180, 0, 0, Math.PI*2); ctx.fill();

            // Net
            const netX = CANVAS_WIDTH / 2 - NET_WIDTH / 2;
            ctx.fillStyle = '#f8fafc';
            ctx.roundRect(netX, CANVAS_HEIGHT - NET_HEIGHT, NET_WIDTH, NET_HEIGHT, 5);
            ctx.fill();
            ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 1; ctx.stroke();
            
            // Net Grid
            ctx.beginPath();
            ctx.setLineDash([4, 4]);
            ctx.strokeStyle = '#94a3b8';
            for(let i=1; i<5; i++) {
                let yPos = CANVAS_HEIGHT - (NET_HEIGHT/5)*i;
                ctx.moveTo(netX, yPos); ctx.lineTo(netX+NET_WIDTH, yPos);
            }
            ctx.stroke();
            ctx.setLineDash([]);
        }

        const p1 = new Character(100, 'psyduck', true);
        const p2 = new Character(CANVAS_WIDTH - 170, 'pikachu', false);
        const ball = new Ball();
        const keys = {};

        function updateGame() {
            if (isGameOver) return;

            // Player Logic
            p1.vx = 0;
            if (keys['ArrowLeft']) { p1.vx = -p1.speed; p1.facingLeft = true; }
            if (keys['ArrowRight']) { p1.vx = p1.speed; p1.facingLeft = false; }
            if (keys['ArrowUp'] && !p1.isJumping) p1.vy = p1.jumpForce;

            // AI Logic (Better positioning to hit left)
            const aiTargetX = ball.x + 35; 
            if (p2.x + p2.width / 2 < aiTargetX - 5) p2.vx = p2.speed * 0.85;
            else if (p2.x + p2.width / 2 > aiTargetX + 5) p2.vx = -p2.speed * 0.85;
            else p2.vx = 0;

            if (ball.x > CANVAS_WIDTH / 2 && ball.y < CANVAS_HEIGHT - 100 && !p2.isJumping && Math.random() < 0.08) {
                p2.vy = p2.jumpForce;
            }

            p1.update(); p2.update(); ball.update();

            checkCollision(p1, ball);
            checkCollision(p2, ball);
        }

        function checkCollision(p, b) {
            let dx = b.x - (p.x + p.width/2);
            let dy = b.y - (p.y + p.height/2);
            let dist = Math.sqrt(dx*dx + dy*dy);
            
            if (dist < b.radius + p.width/2) {
                b.vy = -Math.abs(b.vy) - 7.5;
                b.vx = dx * 0.38;
                if(b.vy < -15) b.vy = -15;
                b.rotationSpeed = b.vx * 0.05;
                b.y = p.y - b.radius;
            }
        }

        function handleSmash(p) {
            let dx = ball.x - (p.x + p.width/2);
            let dy = ball.y - (p.y + p.height/2);
            let dist = Math.sqrt(dx*dx + dy*dy);
            if (dist < 85) {
                const dir = p.isPlayer ? 1 : -1;
                ball.vx = 17 * dir;
                ball.vy = 7;
                ball.rotationSpeed = 0.6 * dir;
            }
        }

        function checkWin() {
            if (score1 >= 15 || score2 >= 15) {
                isGameOver = true;
                winnerText.innerText = score1 >= 15 ? "고라파덕 승리! 🐥" : "피카츄 승리! ⚡";
                overlay.classList.remove('hidden');
            }
        }

        function resetGame() {
            score1 = 0; score2 = 0;
            score1El.innerText = "0"; score2El.innerText = "0";
            isGameOver = false; overlay.classList.add('hidden');
            ball.reset();
            p1.x = 100; p2.x = CANVAS_WIDTH - 170;
        }

        function gameLoop() {
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            drawScene();
            updateGame();
            p1.draw(); p2.draw(); ball.draw();
            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if ((e.code === 'Enter' || e.code === 'ArrowDown') && p1.isJumping) handleSmash(p1);
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        // Mobile Events
        const touchMap = {'btn-left': 'ArrowLeft', 'btn-right': 'ArrowRight', 'btn-up': 'ArrowUp'};
        Object.entries(touchMap).forEach(([id, code]) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', e => { e.preventDefault(); keys[code] = true; });
            el.addEventListener('touchend', e => { e.preventDefault(); keys[code] = false; });
        });
        document.getElementById('btn-down').addEventListener('touchstart', e => {
            e.preventDefault();
            if (p1.isJumping) handleSmash(p1);
        });

        window.onload = gameLoop;
    </script>
</body>
</html>
